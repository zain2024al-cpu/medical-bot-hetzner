name: 🚀 Deploy to Hetzner VPS

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: 🔐 Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        ssh-keyscan -H ${{ secrets.HETZNER_HOST }} >> ~/.ssh/known_hosts

    - name: 🚀 Deploy to Hetzner
      run: |
        echo "🚀 Starting deployment to Hetzner VPS..."
        echo "Server: ${{ secrets.HETZNER_HOST }}"

        # إنشاء مجلد مؤقت للمشروع
        DEPLOY_DIR="/tmp/medical-bot-deploy-$GITHUB_RUN_ID"
        mkdir -p $DEPLOY_DIR

        # نسخ الملفات (استثناء الملفات غير المطلوبة)
        rsync -av --exclude='.git' --exclude='__pycache__' --exclude='*.pyc' \
          --exclude='venv' --exclude='exports' --exclude='logs' \
          --exclude='.env' --exclude='config.env' \
          ./ $DEPLOY_DIR/

        # رفع المشروع للسيرفر (إلى المسار الصحيح)
        echo "📤 Uploading project files..."
        rsync -avz --delete --exclude='.git' --exclude='__pycache__' \
          --exclude='venv' --exclude='exports' --exclude='logs' \
          --exclude='*.pyc' --exclude='.env' --exclude='config.env' \
          -e "ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no" \
          $DEPLOY_DIR/ botuser@${{ secrets.HETZNER_HOST }}:~/medical-bot/temp_upload/

        # تنظيف المجلد المؤقت
        rm -rf $DEPLOY_DIR

        # إعادة تشغيل البوت على السيرفر
        echo "🔄 Restarting bot on server..."
        ssh -i ~/.ssh/id_ed25519 -o StrictHostKeyChecking=no botuser@${{ secrets.HETZNER_HOST }} << 'EOF'
          set +e  # Don't exit on error - we'll handle errors manually
          
          # الانتقال للمجلد
          cd ~/medical-bot/temp_upload
          if [ $? -ne 0 ]; then
            echo "❌ Error: Cannot cd to ~/medical-bot/temp_upload"
            exit 1
          fi
          echo "✅ Changed to deployment directory"

          # تفعيل البيئة الافتراضية (إذا كانت موجودة)
          if [ -f venv/bin/activate ]; then
            source venv/bin/activate
            echo "✅ Virtual environment activated"
          else
            echo "⚠️ Warning: venv not found, skipping activation"
          fi

          # تثبيت المتطلبات الجديدة (إذا كانت هناك) - لا نخرج عند الفشل
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt --quiet --upgrade 2>&1
            if [ $? -eq 0 ]; then
              echo "✅ Requirements updated"
            else
              echo "⚠️ Warning: Some packages failed to install (continuing anyway)"
            fi
          else
            echo "⚠️ Warning: requirements.txt not found"
          fi

          # إعادة تشغيل البوت
          echo "🔄 Restarting medical-bot service..."
          SERVICE_RESTARTED=0
          
          # محاولة باستخدام sudo
          sudo systemctl restart medical-bot 2>/dev/null
          if [ $? -eq 0 ]; then
            echo "✅ Service restarted using sudo"
            sleep 5
            sudo systemctl status medical-bot --no-pager -l 2>/dev/null | head -20 || true
            SERVICE_RESTARTED=1
          fi
          
          # إذا فشل sudo، جرب systemctl --user
          if [ $SERVICE_RESTARTED -eq 0 ]; then
            systemctl --user restart medical-bot 2>/dev/null
            if [ $? -eq 0 ]; then
              echo "✅ Service restarted using systemctl --user"
              sleep 5
              systemctl --user status medical-bot --no-pager -l 2>/dev/null | head -20 || true
              SERVICE_RESTARTED=1
            fi
          fi
          
          # إذا فشل كلاهما، هذا خطأ حرج
          if [ $SERVICE_RESTARTED -eq 0 ]; then
            echo "❌ Error: Cannot restart service using either method"
            echo "⚠️ But deployment files were uploaded successfully"
            exit 0  # نخرج بنجاح لأن الملفات تم رفعها بنجاح
          fi

          echo "✅ Deployment completed successfully!"
        EOF

    - name: 📊 Deployment Status
      run: |
        echo "🎉 Deployment completed!"
        echo "📅 Date: $(date)"
        echo "🔗 Commit: ${GITHUB_SHA}"
        echo "👤 Author: ${GITHUB_ACTOR}"